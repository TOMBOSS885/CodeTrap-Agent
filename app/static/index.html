<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeTrap-Agent</title>
  <style>
    :root { color-scheme: light; --ink:#182026; --muted:#5b6872; --line:#d7dde2; --accent:#0f766e; --danger:#b42318; --ok:#047857; --bg:#f7f8fa; --panel:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; color:var(--ink); background:var(--bg); }
    header { padding:24px 32px 16px; background:#fff; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 6px; font-size:28px; letter-spacing:0; }
    h2 { margin:0 0 12px; font-size:18px; }
    h3 { margin:16px 0 8px; font-size:15px; }
    p { margin:0; color:var(--muted); line-height:1.5; }
    main { max-width:1360px; margin:0 auto; padding:20px; display:grid; grid-template-columns:300px 1fr; gap:18px; }
    section, aside { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
    label { display:block; font-weight:650; margin:12px 0 6px; }
    select, input, button { width:100%; font:inherit; border:1px solid var(--line); border-radius:6px; padding:10px; background:#fff; }
    button { background:var(--accent); color:#fff; border-color:var(--accent); cursor:pointer; font-weight:700; margin-top:10px; }
    button.secondary { background:#fff; color:var(--accent); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    pre { background:#101820; color:#e8f3f1; padding:12px; border-radius:8px; overflow:auto; margin:0; white-space:pre-wrap; }
    code { background:#eef2f4; padding:2px 5px; border-radius:4px; }
    .families { display:grid; gap:10px; margin-top:12px; }
    .family { border:1px solid var(--line); border-radius:8px; padding:12px; cursor:pointer; }
    .family.active { border-color:var(--accent); background:#edf7f5; }
    .layout { display:grid; grid-template-columns:minmax(0, 1fr) 380px; gap:18px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .panel { border:1px solid var(--line); border-radius:8px; padding:14px; margin-top:14px; }
    .case { border-top:1px solid var(--line); padding:12px 0; }
    .case:first-child { border-top:0; }
    .case-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
    .mutant, .source { border-top:1px solid var(--line); padding:10px 0; }
    .mutant:first-child, .source:first-child { border-top:0; }
    .stats { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:10px; margin-top:12px; }
    .stat { border:1px solid var(--line); border-radius:8px; padding:12px; }
    .stat strong { display:block; font-size:22px; }
    .passed { color:var(--ok); }
    .failed { color:var(--danger); }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .hint { font-size:13px; color:var(--muted); margin-top:8px; }
    @media (max-width: 1080px) { main, .layout { grid-template-columns:1fr; } }
    @media (max-width: 620px) { main { padding:12px; } header { padding:20px; } .row, .stats, .actions, .case-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>CodeTrap-Agent</h1>
    <p>联网搜索相似易错题，生成题目原题、对抗测试数据、期望输出和参考答案。</p>
  </header>
  <main>
    <aside>
      <h2>题型列表</h2>
      <div id="families" class="families"></div>
    </aside>
    <div class="layout">
      <section>
        <h2 id="family-title">请选择题型</h2>
        <p id="family-desc"></p>
        <div class="panel">
          <h3>生成设置</h3>
          <div class="row">
            <div>
              <label for="level">测试等级</label>
              <select id="level">
                <option value="basic">基础 basic</option>
                <option value="edge">边界 edge</option>
                <option value="adversarial">对抗 adversarial</option>
              </select>
            </div>
            <div>
              <label for="count">测试用例数量</label>
              <input id="count" type="number" min="1" max="50" value="5">
            </div>
          </div>
          <label for="query">联网搜索关键词</label>
          <input id="query" placeholder="留空则自动按当前题型搜索易错题素材">
          <label><input id="search-online" type="checkbox" checked style="width:auto;margin-right:6px">启用联网搜索</label>
          <label><input id="use-ai" type="checkbox" style="width:auto;margin-right:6px">使用 AI 生成更自然的题面</label>
          <button id="generate-problem">生成完整题目</button>
          <p class="hint">生成结果会包含题目原题、多个测试数据、每个用例的期望输出、参考答案和搜索来源。</p>
        </div>
        <div class="panel">
          <h3>题目原题</h3>
          <pre id="statement">请先点击“生成完整题目”。</pre>
        </div>
        <div class="panel">
          <h3>测试数据与期望输出</h3>
          <div id="cases"><p>暂无测试数据。</p></div>
        </div>
        <div class="panel">
          <h3>参考答案</h3>
          <pre id="reference-answer">暂无参考答案。</pre>
        </div>
        <div class="panel">
          <h3>评测候选解法</h3>
          <label for="solution">上传候选 Python 解法</label>
          <input id="solution" type="file" accept=".py">
          <button id="judge">使用上方测试数据评测</button>
          <div class="actions">
            <button id="view-report" class="secondary" disabled>查看 HTML 报告</button>
            <button id="download" class="secondary" disabled>下载 Markdown</button>
          </div>
          <div id="stats" class="stats"></div>
        </div>
      </section>
      <section>
        <h2>搜索来源</h2>
        <div id="sources"><p>生成题目后显示来源。</p></div>
        <div class="panel">
          <h3>常见错误解法</h3>
          <div id="mutants"><p>请选择题型查看错误解法样例。</p></div>
        </div>
        <div class="panel">
          <h3>原始输出</h3>
          <pre id="output">正在加载题型...</pre>
        </div>
      </section>
    </div>
  </main>
  <script>
    let selected = null;
    let generatedCases = [];
    let problemId = null;
    let reportId = null;
    const out = document.getElementById("output");
    const show = (value) => out.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    const pretty = (value) => JSON.stringify(value, null, 2);

    function renderStats(result) {
      const stats = document.getElementById("stats");
      if (!result) { stats.innerHTML = ""; return; }
      const rate = result.total_cases ? (result.passed_cases / result.total_cases * 100).toFixed(1) : "0.0";
      stats.innerHTML = `
        <div class="stat"><strong>${result.total_cases}</strong><span>总用例</span></div>
        <div class="stat"><strong class="passed">${result.passed_cases}</strong><span>通过</span></div>
        <div class="stat"><strong class="${result.failed_cases.length ? "failed" : "passed"}">${rate}%</strong><span>通过率</span></div>
      `;
    }

    function renderCases(cases) {
      const box = document.getElementById("cases");
      if (!cases.length) { box.innerHTML = "<p>暂无测试数据。</p>"; return; }
      box.innerHTML = cases.map((c, index) => `
        <div class="case">
          <strong>用例 ${index + 1}：${c.name}</strong>
          <p>${c.trap_reason}</p>
          <div class="case-grid">
            <div><h3>输入</h3><pre>${pretty(c.input_data)}</pre></div>
            <div><h3>期望输出</h3><pre>${pretty(c.expected_output)}</pre></div>
          </div>
        </div>
      `).join("");
    }

    function renderSources(problem) {
      const box = document.getElementById("sources");
      const status = `<p class="hint">搜索状态：${problem.search_status}；关键词：${problem.search_query}</p>`;
      if (!problem.sources.length) {
        box.innerHTML = status + "<p>没有获取到在线来源，当前使用内置离线题型模板生成。</p>";
        return;
      }
      box.innerHTML = status + problem.sources.map(s => `
        <div class="source">
          <strong><a href="${s.url}" target="_blank" rel="noreferrer">${s.title}</a></strong>
          <p>${s.snippet || ""}</p>
        </div>
      `).join("");
    }

    async function selectFamily(familyId) {
      selected = familyId;
      document.querySelectorAll(".family").forEach(x => x.classList.toggle("active", x.dataset.id === familyId));
      const detail = await fetch(`/api/families/${familyId}`).then(r => r.json());
      document.getElementById("family-title").textContent = detail.title;
      document.getElementById("family-desc").textContent = detail.description;
      document.getElementById("mutants").innerHTML = detail.mutants.map(m => `
        <div class="mutant">
          <strong>${m.title}</strong>
          <p>${m.description}</p>
          <pre>${m.code}</pre>
        </div>
      `).join("");
      show(detail);
    }

    async function loadFamilies() {
      const families = await fetch("/api/families").then(r => r.json());
      const box = document.getElementById("families");
      box.innerHTML = "";
      families.forEach((family) => {
        const div = document.createElement("div");
        div.className = "family";
        div.dataset.id = family.family_id;
        div.innerHTML = `<strong>${family.title}</strong><br><small>${family.family_id} · ${family.tags.join(", ")}</small>`;
        div.onclick = () => selectFamily(family.family_id);
        box.appendChild(div);
      });
      if (families.length) await selectFamily(families[0].family_id);
    }

    document.getElementById("generate-problem").onclick = async () => {
      const body = {
        level: level.value,
        count: Number(count.value),
        search_online: document.getElementById("search-online").checked,
        use_ai: document.getElementById("use-ai").checked,
        query: document.getElementById("query").value || null
      };
      show("正在联网搜索并生成题目...");
      const res = await fetch(`/api/families/${selected}/problem`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) }).then(r => r.json());
      const problem = res.problem;
      problemId = res.problem_id;
      generatedCases = problem.cases || [];
      document.getElementById("statement").textContent = `题目记录 ID：${problemId}\n生成任务 ID：${res.run_id}\n\n${problem.statement}`;
      document.getElementById("reference-answer").textContent = problem.reference_answer;
      renderCases(generatedCases);
      renderSources(problem);
      show(res);
    };

    document.getElementById("judge").onclick = async () => {
      const file = document.getElementById("solution").files[0];
      if (!file) { show("请先选择一个 Python 文件。"); return; }
      const form = new FormData();
      form.append("file", file);
      form.append("level", level.value);
      form.append("count", count.value);
      if (problemId) {
        form.append("problem_id", problemId);
      } else if (generatedCases.length) {
        form.append("cases_json", JSON.stringify(generatedCases));
      }
      const res = await fetch(`/api/judge/${selected}`, { method:"POST", body: form }).then(r => r.json());
      reportId = res.report_id;
      document.getElementById("download").disabled = !reportId;
      document.getElementById("view-report").disabled = !reportId;
      renderStats(res.result);
      show(res);
    };

    document.getElementById("download").onclick = () => {
      if (reportId) location.href = `/api/reports/${reportId}/download`;
    };
    document.getElementById("view-report").onclick = () => {
      if (reportId) window.open(`/api/reports/${reportId}`, "_blank");
    };
    loadFamilies().catch(err => show(String(err)));
  </script>
</body>
</html>
