services:
  codetrap-agent:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    container_name: codetrap-agent
    ports:
      - "3141:3141"
    environment:
      - CODETRAP_SANDBOX=${CODETRAP_SANDBOX:-subprocess}
      - CODETRAP_DOCKER_IMAGE=${CODETRAP_DOCKER_IMAGE:-python:3.11-slim}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
