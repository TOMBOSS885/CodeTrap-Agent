services:
  codetrap-agent:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    ports:
      - "3141:3141"
    environment:
      CODETRAP_PASSWORD: ${CODETRAP_PASSWORD:?set CODETRAP_PASSWORD in .env}
      CODETRAP_ALLOW_PRIVATE_BASE_URL: ${CODETRAP_ALLOW_PRIVATE_BASE_URL:-0}
    volumes:
      - codetrap-agent-data:/data

volumes:
  codetrap-agent-data:
